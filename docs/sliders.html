<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Political Galaxy – Sliders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/sliders.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur border-b border-slate-700">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-sm font-bold">PG</div>
          <span class="font-semibold text-lg tracking-tight">Political Galaxy</span>
        </div>
        <div class="flex gap-1">
          <a href="index.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Index</a>
          <a href="sliders.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium bg-indigo-600 text-white">Sliders</a>
          <a href="detail.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Detail</a>
          <a href="galaxy.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Galaxy</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-16 pb-8 max-w-7xl mx-auto px-3 py-5">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
      <div>
        <h1 class="text-2xl font-bold">Sliders Explorer</h1>
        <p class="text-slate-400 text-sm">Interactive axes arranged around the centre. Data from the repository Index.</p>
      </div>
      <div class="flex gap-1 bg-slate-900 rounded-lg p-1 border border-slate-700" id="mode-toggle">
        <button data-mode="modern" class="mode-btn px-3 py-1.5 rounded-md text-sm font-medium bg-indigo-600 text-white">Modern</button>
        <button data-mode="historical" class="mode-btn px-3 py-1.5 rounded-md text-sm font-medium text-slate-400">Historical</button>
        <button data-mode="all" class="mode-btn px-3 py-1.5 rounded-md text-sm font-medium text-slate-400">All</button>
      </div>
    </div>

    <!-- Orbital container -->
    <div id="orbital" class="relative mx-auto bg-slate-900/40 border border-slate-700 rounded-2xl overflow-hidden" style="width:100%; max-width:980px; height:640px;">
      <!-- Centre panel (mode controls / nearest matches) -->
      <div id="center-panel" class="absolute z-30" style="top:50%; left:50%; transform:translate(-50%,-50%); width:240px;"></div>

      <!-- 14 slider groups will be absolutely positioned by JS around the centre -->
      <div id="slider-container" class="absolute inset-0"></div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/sliders.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (typeof loadIndexData === "function") await loadIndexData();
      if (typeof initSliders === "function") initSliders();
    });
  </script>
</body>
</html>
