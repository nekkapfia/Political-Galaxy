<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Political Galaxy – Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/shared.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur border-b border-slate-700">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-sm font-bold">PG</div>
          <span class="font-semibold text-lg tracking-tight">Political Galaxy</span>
        </div>
        <div class="flex gap-1">
          <a href="index.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Index</a>
          <a href="sliders.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Sliders</a>
          <a href="detail.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium bg-indigo-600 text-white">Detail</a>
          <a href="galaxy.html" class="nav-btn px-4 py-2 rounded-md text-sm font-medium">Galaxy</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-16 pb-12 max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Country + Year Detail</h1>
    <p class="text-slate-400 mb-6 text-sm">Each slider is looked up independently using its own era boundaries. Source links open the justifying document section.</p>

    <div class="flex flex-col md:flex-row gap-6">
      <div class="w-full md:w-64 shrink-0">
        <div class="bg-slate-900 rounded-xl border border-slate-700 p-4 space-y-3">
          <div>
            <label class="block text-xs text-slate-400 mb-1">Country</label>
            <select id="detail-country" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1.5 text-sm"></select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Year</label>
            <input type="number" id="detail-year" value="2024" min="1900" max="2030"
                   class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1.5 text-sm" />
          </div>
          <button id="detail-lookup" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 rounded text-sm font-medium">Show scores</button>
        </div>
      </div>
      <div class="flex-1 bg-slate-900 rounded-xl border border-slate-700 p-5 min-h-[50vh]" id="entity-detail">
        <p class="text-slate-500">Select a country and year, then click “Show scores”.</p>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/detail.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (typeof loadIndexData === "function") await loadIndexData();
      if (typeof initDetail === "function") initDetail();
    });
  </script>
</body>
</html>
